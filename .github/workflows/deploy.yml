name: Deploy

on:
  push:
    branches:
      - main      # Production deploy
      - staging   # Staging deploy

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel@latest pull --yes --environment=${{ github.ref_name == 'main' && 'production' || 'preview' }} --token=$VERCEL_TOKEN
          npx vercel@latest build ${{ github.ref_name == 'main' && '--prod' || '' }} --token=$VERCEL_TOKEN
          npx vercel@latest deploy --prebuilt ${{ github.ref_name == 'main' && '--prod' || '' }} --token=$VERCEL_TOKEN

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run db:migrate
